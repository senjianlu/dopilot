# dopilot default deployment stack: pulls the CI-built unified dopilot image
# (server / agent / migrate roles selected by the container command).
#
# Quick deploy — no local build required:
#   cd deploy/docker
#   docker compose pull
#   docker compose up -d
#
# The image defaults to ${DOPILOT_IMAGE:-rabbir/dopilot:latest} (Docker Hub
# namespace rabbir; unrelated to the git origin senjianlu). To build the image
# from local source instead of pulling, layer the build override:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# The server role serves the bundled Web SPA from the same container. Single
# server replica only (hard constraint: in-process scheduler + in-memory
# pull/SSE tables cannot be replicated).
#
# Default configs are BAKED INTO the image at /app/configs/server.toml and
# /app/configs/agent.toml (see deploy/docker/Dockerfile), so the default path
# needs no host config mounts. To customize, mount your own TOML over those
# paths in a compose override.
#
# The stack runs PostgreSQL, Redis, a one-shot migration, three Scrapy agents,
# and one server.
#
# ---------------------------------------------------------------------------
# Deployment env (set these in your shell or a .env file next to this compose):
#
#   Required (change before any real deployment — the defaults are dev-only):
#     DOPILOT_ADMIN_PASSWORD     Web admin login password (server [auth]).
#     DOPILOT_ADMIN_API_TOKEN    Static admin API token: usable directly as
#                                `Authorization: Bearer <token>`. ALSO the single
#                                source for the server<->agent machine tokens:
#                                when the split tokens below are unset, both sides
#                                derive their shared token from this value, so it
#                                must be injected into the server AND every agent.
#                                A non-empty value must be >= 16 characters.
#     REDIS_PASSWORD             Redis AUTH password (used in the redis URL).
#
#   The login/SSE signing key (server [auth].token_secret) is TOML-only and is
#   baked into the image (a generated long value, not a per-deployment secret);
#   high-security deployments override it by mounting their own server TOML.
#
#   Optional (advanced — only if you want SPLIT machine tokens instead of the
#   single DOPILOT_ADMIN_API_TOKEN): uncomment in the server + agent services.
#     DOPILOT_AGENT_SHARED_TOKEN   server -> agent token (egg deploy).
#     DOPILOT_SERVER_SHARED_TOKEN  agent -> server token (heartbeat).
#
# The config TOML path is an internal image detail (baked per role into each
# entrypoint); compose does NOT set DOPILOT_CONFIG. Redis is never published to a
# host port and keeps password AUTH on by default.
# ---------------------------------------------------------------------------

# Shared agent definition. The three agents differ only by AGENT_ID + data
# volume; the agent config loader lets AGENT_ID / AGENT_WORKDIR / DOPILOT_REDIS_URL
# env vars override the baked TOML (read from the role default /app/configs/agent.toml
# — no DOPILOT_CONFIG needed). Each advertises endpoint=None, so its node endpoint
# becomes the distinct `agent://{agent_id}` => three distinct nodes.
x-agent: &agent
  image: ${DOPILOT_IMAGE:-rabbir/dopilot:latest}
  command: ["dopilot-agent", "-b", "0.0.0.0", "-p", "6800"]
  init: true
  depends_on:
    redis:
      condition: service_healthy
  # /health is unauthenticated and reports the scrapyd subprocess status under
  # detail.scrapyd.running. We only gate on HTTP 200 here (service_healthy);
  # smoke separately asserts detail.scrapyd.running == true. Uses python3 (the
  # image has no curl) and a short timeout so a hung agent fails fast.
  healthcheck:
    test:
      - "CMD"
      - "python3"
      - "-c"
      - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:6800/health', timeout=3).status==200 else 1)"
    interval: 5s
    timeout: 5s
    retries: 20
    start_period: 30s
  restart: unless-stopped

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dopilot
      POSTGRES_USER: dopilot
      POSTGRES_PASSWORD: dopilot
    volumes:
      - dopilot-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopilot -d dopilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis Streams transport for server<->agent comms (phase 1.5). AUTH +
  # append-only file (AOF) on; single instance (matches the single-server
  # constraint — Redis here is a message bus, NOT a multi-replica HA store).
  # Override the password with REDIS_PASSWORD in the environment.
  redis:
    image: redis:7
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "${REDIS_PASSWORD:-change-me-redis-pass}"
    volumes:
      - dopilot-redis:/data
    healthcheck:
      test:
        - "CMD"
        - "redis-cli"
        - "--no-auth-warning"
        - "-a"
        - "${REDIS_PASSWORD:-change-me-redis-pass}"
        - "ping"
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # One-shot migration step: brings an empty database up to head before the
  # server starts. Reuses the unified image and overrides its entrypoint. Keeps
  # migrations an explicit, observable step; the server never runs create_all().
  migrate:
    image: ${DOPILOT_IMAGE:-rabbir/dopilot:latest}
    command: ["alembic", "upgrade", "head"]
    environment:
      DOPILOT_DATABASE_URL: postgresql+psycopg://dopilot:dopilot@db:5432/dopilot
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  scrapy-agent-1:
    <<: *agent
    environment:
      AGENT_ID: scrapy-agent-1
      AGENT_WORKDIR: /agent-data
      DOPILOT_REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0
      # Single secret: both server<->agent machine tokens derive from this unless
      # the optional split tokens below are set. Dev default is >= 16 chars.
      DOPILOT_ADMIN_API_TOKEN: ${DOPILOT_ADMIN_API_TOKEN:-change-me-admin-api-token}
      # DOPILOT_AGENT_SHARED_TOKEN: ${DOPILOT_AGENT_SHARED_TOKEN:-}
      # DOPILOT_SERVER_SHARED_TOKEN: ${DOPILOT_SERVER_SHARED_TOKEN:-}
    volumes:
      - dopilot-agent1-data:/agent-data
    ports:
      # ONLY scrapy-agent-1 publishes its HTTP API (6800) for smoke/debug. The
      # internal scrapyd port (6801) is NEVER published to the host (scrapyd has
      # no auth and must stay container-internal). scrapy-agent-2/3 keep all
      # ports container-internal.
      - "6800:6800"

  scrapy-agent-2:
    <<: *agent
    environment:
      AGENT_ID: scrapy-agent-2
      AGENT_WORKDIR: /agent-data
      DOPILOT_REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0
      DOPILOT_ADMIN_API_TOKEN: ${DOPILOT_ADMIN_API_TOKEN:-change-me-admin-api-token}
      # DOPILOT_AGENT_SHARED_TOKEN: ${DOPILOT_AGENT_SHARED_TOKEN:-}
      # DOPILOT_SERVER_SHARED_TOKEN: ${DOPILOT_SERVER_SHARED_TOKEN:-}
    volumes:
      - dopilot-agent2-data:/agent-data

  scrapy-agent-3:
    <<: *agent
    environment:
      AGENT_ID: scrapy-agent-3
      AGENT_WORKDIR: /agent-data
      DOPILOT_REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0
      DOPILOT_ADMIN_API_TOKEN: ${DOPILOT_ADMIN_API_TOKEN:-change-me-admin-api-token}
      # DOPILOT_AGENT_SHARED_TOKEN: ${DOPILOT_AGENT_SHARED_TOKEN:-}
      # DOPILOT_SERVER_SHARED_TOKEN: ${DOPILOT_SERVER_SHARED_TOKEN:-}
    volumes:
      - dopilot-agent3-data:/agent-data

  server:
    image: ${DOPILOT_IMAGE:-rabbir/dopilot:latest}
    command: ["dopilot-server", "-b", "0.0.0.0", "-p", "5000"]
    init: true
    environment:
      DOPILOT_DATABASE_URL: postgresql+psycopg://dopilot:dopilot@db:5432/dopilot
      DOPILOT_REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0
      # Web admin password + static admin API token (override the dev-only
      # defaults). token_secret is TOML-only (baked into the image).
      DOPILOT_ADMIN_PASSWORD: ${DOPILOT_ADMIN_PASSWORD:-change-me}
      # Also the single source for the server<->agent machine tokens (see header).
      DOPILOT_ADMIN_API_TOKEN: ${DOPILOT_ADMIN_API_TOKEN:-change-me-admin-api-token}
      # Optional split machine tokens (override the DOPILOT_ADMIN_API_TOKEN fallback):
      # DOPILOT_AGENT_SHARED_TOKEN: ${DOPILOT_AGENT_SHARED_TOKEN:-}
      # DOPILOT_SERVER_SHARED_TOKEN: ${DOPILOT_SERVER_SHARED_TOKEN:-}
    volumes:
      - dopilot-server-data:/server-data
    ports:
      - "5000:5000"
    # /api/v1/health is always HTTP 200 (it reports DB reachability in the body,
    # not the status code), so it is a liveness probe: it goes healthy once the
    # ASGI app is accepting connections. The smoke waits on this before driving
    # the Scrapy chain.
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/api/v1/health', timeout=3).status==200 else 1)"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      scrapy-agent-1:
        condition: service_healthy
      scrapy-agent-2:
        condition: service_healthy
      scrapy-agent-3:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dopilot-db:
  dopilot-redis:
  dopilot-server-data:
  dopilot-agent1-data:
  dopilot-agent2-data:
  dopilot-agent3-data:
