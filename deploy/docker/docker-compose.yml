# dopilot local stack: db + unified dopilot image running server/agent roles.
#
# This compose file lives in deploy/docker, so build contexts point at the repo
# ROOT via context: ../.. (Dockerfile expects the repo root as its context).
#
# The server role serves the bundled Web SPA from the same container. Single
# server replica only (hard constraint: in-process scheduler + in-memory
# pull/SSE tables cannot be replicated).
#
# Image namespace is rabbir (Docker Hub); unrelated to the git origin senjianlu.
# server, agent, and migrate all use the same image; command selects the role.

x-dopilot-build: &dopilot-build
  context: ../..
  dockerfile: deploy/docker/Dockerfile
  args:
    DOPILOT_PY_BASE_IMAGE: ${DOPILOT_PY_BASE_IMAGE:-rabbir/dopilot-py-base:local}
    DOPILOT_WEB_BASE_IMAGE: ${DOPILOT_WEB_BASE_IMAGE:-rabbir/dopilot-web-base:local}

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dopilot
      POSTGRES_USER: dopilot
      POSTGRES_PASSWORD: dopilot
    volumes:
      - dopilot-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopilot -d dopilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis Streams transport for server<->agent comms (phase 1.5). AUTH +
  # append-only file (AOF) on; single instance (matches the single-server
  # constraint — Redis here is a message bus, NOT a multi-replica HA store).
  # Override the password with REDIS_PASSWORD in the environment.
  redis:
    image: redis:7
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "${REDIS_PASSWORD:-change-me-redis-pass}"
    volumes:
      - dopilot-redis:/data
    healthcheck:
      test:
        - "CMD"
        - "redis-cli"
        - "--no-auth-warning"
        - "-a"
        - "${REDIS_PASSWORD:-change-me-redis-pass}"
        - "ping"
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # One-shot migration step: brings an empty database up to head before the
  # server starts. Reuses the server image (same build + tag, built once) and
  # overrides its entrypoint. Keeps migrations an explicit, observable step;
  # the server process never runs create_all().
  migrate:
    build: *dopilot-build
    image: rabbir/dopilot:latest
    command: ["alembic", "upgrade", "head"]
    environment:
      DOPILOT_DATABASE_URL: postgresql+psycopg://dopilot:dopilot@db:5432/dopilot
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  agent:
    build: *dopilot-build
    image: rabbir/dopilot:latest
    command: ["dopilot-agent", "-b", "0.0.0.0", "-p", "6800"]
    init: true
    environment:
      DOPILOT_CONFIG: /app/configs/agent.toml
      AGENT_ID: scrapy-agent-1
      AGENT_WORKDIR: /agent-data
      DOPILOT_REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - dopilot-agent-data:/agent-data
      - ../../configs/agent.example.toml:/app/configs/agent.toml:ro
    ports:
      # ONLY the agent HTTP API is published. The internal scrapyd port (6801)
      # is NEVER exposed to the host in the committed compose. For local
      # debugging only, you may temporarily uncomment the line below — do NOT
      # commit it (scrapyd has no auth and must stay container-internal):
      #   - "6801:6801"
      - "6800:6800"
    # /health is unauthenticated and reports the scrapyd subprocess status under
    # detail.scrapyd.running. We only gate on HTTP 200 here (service_healthy);
    # the smoke separately asserts detail.scrapyd.running == true. Uses python3
    # (the image has no curl) and a short timeout so a hung agent fails fast.
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:6800/health', timeout=3).status==200 else 1)"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  server:
    build: *dopilot-build
    image: rabbir/dopilot:latest
    command: ["dopilot-server", "-b", "0.0.0.0", "-p", "5000"]
    init: true
    environment:
      DOPILOT_CONFIG: /app/configs/server.toml
      DOPILOT_DATABASE_URL: postgresql+psycopg://dopilot:dopilot@db:5432/dopilot
      DOPILOT_REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0
    volumes:
      - dopilot-server-data:/server-data
      # compose-network config: db/agent reached by service name (not localhost)
      - ../../configs/server.docker.toml:/app/configs/server.toml:ro
    ports:
      - "5000:5000"
    # /api/v1/health is always HTTP 200 (it reports DB reachability in the body,
    # not the status code), so it is a liveness probe: it goes healthy once the
    # ASGI app is accepting connections. The smoke waits on this before driving
    # the Scrapy chain.
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/api/v1/health', timeout=3).status==200 else 1)"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      agent:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dopilot-db:
  dopilot-redis:
  dopilot-server-data:
  dopilot-agent-data:
