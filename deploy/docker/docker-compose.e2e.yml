# dopilot Phase 1.8 E2E acceptance override: three real Scrapy agents.
#
# Layer this ON TOP of docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --build
#
# (scripts/smoke-phase1.sh does exactly this.) The base file already defines one
# agent service `agent` (AGENT_ID=scrapy-agent-1, publishes 6800). This override
# adds two MORE agent containers — scrapy-agent-2 and scrapy-agent-3 — and makes
# the server wait for all three to be healthy.
#
# Why this shape works without touching the agent config:
#   * the agent config loader lets AGENT_ID / AGENT_WORKDIR / DOPILOT_REDIS_URL
#     env vars override the mounted TOML, so all three agents share the one
#     committed configs/agent.example.toml and differ only by env + data volume;
#   * each agent advertises endpoint=None, so its node endpoint becomes the
#     distinct `agent://{agent_id}` — three AGENT_IDs => three distinct nodes;
#   * the scrapyd child binds 127.0.0.1:6801 INSIDE each container, so all three
#     reuse 6801 with no host-port collision (they are never published);
#   * only the base `agent` publishes 6800; scrapy-agent-2/3 keep all ports
#     container-internal (the smoke probes scrapyd health via the server's
#     /api/v1/nodes heartbeat detail, not by hitting the agents directly).
#
# Keep ONE server, ONE db, ONE redis, ONE migrate, ONE unified image.

x-dopilot-build: &dopilot-build
  context: ../..
  dockerfile: deploy/docker/Dockerfile
  args:
    DOPILOT_PY_BASE_IMAGE: ${DOPILOT_PY_BASE_IMAGE:-rabbir/dopilot-py-base:local}
    DOPILOT_WEB_BASE_IMAGE: ${DOPILOT_WEB_BASE_IMAGE:-rabbir/dopilot-web-base:local}

# Shared definition for the two EXTRA agents (scrapy-agent-1 is the base `agent`).
x-extra-agent: &extra-agent
  build: *dopilot-build
  image: rabbir/dopilot:latest
  command: ["dopilot-agent", "-b", "0.0.0.0", "-p", "6800"]
  init: true
  depends_on:
    redis:
      condition: service_healthy
  # No published ports: these agents stay container-internal on purpose.
  healthcheck:
    test:
      - "CMD"
      - "python3"
      - "-c"
      - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:6800/health', timeout=3).status==200 else 1)"
    interval: 5s
    timeout: 5s
    retries: 20
    start_period: 30s
  restart: unless-stopped

services:
  scrapy-agent-2:
    <<: *extra-agent
    environment:
      DOPILOT_CONFIG: /app/configs/agent.toml
      AGENT_ID: scrapy-agent-2
      AGENT_WORKDIR: /agent-data
      DOPILOT_REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0
    volumes:
      - dopilot-agent2-data:/agent-data
      - ../../configs/agent.example.toml:/app/configs/agent.toml:ro

  scrapy-agent-3:
    <<: *extra-agent
    environment:
      DOPILOT_CONFIG: /app/configs/agent.toml
      AGENT_ID: scrapy-agent-3
      AGENT_WORKDIR: /agent-data
      DOPILOT_REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0
    volumes:
      - dopilot-agent3-data:/agent-data
      - ../../configs/agent.example.toml:/app/configs/agent.toml:ro

  # Wait for all three agents before the server comes up (merged with the base
  # server.depends_on, which already requires db / redis / migrate / agent).
  server:
    depends_on:
      scrapy-agent-2:
        condition: service_healthy
      scrapy-agent-3:
        condition: service_healthy

volumes:
  dopilot-agent2-data:
  dopilot-agent3-data:
