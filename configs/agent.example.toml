# dopilot agent example config.
#
# Copy to configs/agent.toml and edit, or rely on environment overrides in
# Docker deployments.
#
# Single-secret machine tokens (phase 2.2.1): the two shared-token fields below
# are intentionally EMPTY so the loader defaults them to DOPILOT_ADMIN_API_SECRET
# (the same secret the server uses). For split tokens, set
# DOPILOT_AGENT_SHARED_TOKEN (server -> agent) / DOPILOT_SERVER_SHARED_TOKEN
# (agent -> server), or fill the fields here; they MUST then match the server's
# [agent_auth].shared_token / [agents].server_shared_token respectively.

[agent]
agent_id = "scrapy-agent-1"
host = "0.0.0.0"
port = 6800
workdir = "/agent-data"
# Phase 1.5: where the agent POSTs heartbeats, and the agent -> server token.
# Empty => defaults to DOPILOT_ADMIN_API_SECRET; an explicit value (or
# DOPILOT_SERVER_SHARED_TOKEN) must match the server's [agents].server_shared_token.
server_url = "http://server:5000"
heartbeat_interval_seconds = 10
server_shared_token = ""

[auth]
# server -> agent token (egg deploy). Empty => defaults to DOPILOT_ADMIN_API_SECRET;
# an explicit value (or DOPILOT_AGENT_SHARED_TOKEN) must match the server's
# [agent_auth].shared_token.
shared_token = ""

# Phase 2b: the unified agent image ships python + pip, so it can run
# python_wheel ("script") tasks via `pip install --no-deps --target` + PYTHONPATH.
# Scrapy stays enabled; docker long-lived crawlers are a later phase.
[capabilities]
scrapy = true
script = true
docker = false

# Redis Streams transport (phase 1.5). Reach redis by compose service name.
[redis]
url = "redis://:change-me-redis-pass@redis:6379/0"
command_block_ms = 5000
pending_idle_ms = 30000
event_outbox_dir = "/agent-data/outbox"

# Local scrapyd subprocess the agent owns.
# host/port are container-internal (NEVER exposed to the host); the server only
# ever talks to the agent on [agent].port (6800). Data dirs live under
# {workdir}/scrapyd/{eggs,logs,dbs,items}. Set start = false to point the agent
# at an externally managed scrapyd instead of spawning a child.
[scrapyd]
start = true
host = "127.0.0.1"
port = 6801
