# dopilot agent example config.
#
# Copy to configs/agent.toml and edit, or rely on environment overrides in
# Docker deployments.
#
# Single server<->agent token (phase 2.2.3): [agent].agent_token below is the ONE
# machine secret. It authenticates BOTH directions (server -> agent egg deploy,
# agent -> server heartbeat) and MUST match the server's [agents].agent_token.
# Set it via DOPILOT_AGENT_TOKEN or the field; a non-empty value must be >= 16
# chars; empty keeps machine auth OFF. The agent is NEVER given the admin API
# token — DOPILOT_ADMIN_API_TOKEN and the old split envs/fields have no effect.
#
# Token auth is NOT transport encryption: keep server/agent/Redis on a private
# network or VPN (or terminate TLS at a proxy) for encrypted cross-host traffic.

[agent]
agent_id = "scrapy-agent-1"
host = "0.0.0.0"
port = 6800
workdir = "/agent-data"
# Phase 1.5: where the agent POSTs heartbeats. Phase 2.2.3: agent_token is the
# single server<->agent machine token (see the header). Empty => machine auth OFF.
server_url = "http://server:5000"
heartbeat_interval_seconds = 10
agent_token = ""

# Phase 2b: the unified agent image ships python + pip, so it can run
# python_wheel ("script") tasks via `pip install --no-deps --target` + PYTHONPATH.
# Scrapy stays enabled; docker long-lived crawlers are a later phase.
[capabilities]
scrapy = true
script = true
docker = false

# Redis Streams transport (phase 1.5). Reach redis by compose service name.
[redis]
url = "redis://:change-me-redis-pass@redis:6379/0"
command_block_ms = 5000
pending_idle_ms = 30000
event_outbox_dir = "/agent-data/outbox"

# Local scrapyd subprocess the agent owns.
# host/port are container-internal (NEVER exposed to the host); the server only
# ever talks to the agent on [agent].port (6800). Data dirs live under
# {workdir}/scrapyd/{eggs,logs,dbs,items}. Set start = false to point the agent
# at an externally managed scrapyd instead of spawning a child.
[scrapyd]
start = true
host = "127.0.0.1"
port = 6801
