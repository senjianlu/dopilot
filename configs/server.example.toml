# dopilot server example config.
#
# Copy to configs/server.toml and edit, or rely on DOPILOT_* environment
# overrides in Docker deployments.
# WARNING: every "change-me" value below is a placeholder and is NOT production-safe.
# Replace admin_password / token_secret / shared_token before any real deployment.
#
# Env overrides (phase 2.2): any scalar/secret below can be overridden by a
# DOPILOT_* environment variable (env wins over TOML), so real deployments inject
# secrets without mounting a TOML — e.g. DOPILOT_ADMIN_PASSWORD, DOPILOT_ADMIN_API_SECRET,
# DOPILOT_DATABASE_URL, DOPILOT_REDIS_URL, DOPILOT_SERVER_PORT,
# DOPILOT_SCHEDULER_ENABLED, DOPILOT_AUTH_DISABLED.
#
# Single-secret machine tokens (phase 2.2.1): leave [agent_auth].shared_token and
# [agents].server_shared_token empty to default them to the effective admin API
# secret (auth.token_secret / DOPILOT_ADMIN_API_SECRET); set
# DOPILOT_AGENT_SHARED_TOKEN / DOPILOT_SERVER_SHARED_TOKEN for split tokens.
#
# Web admin auth is FAIL-CLOSED: the server refuses to start unless
# admin_username + admin_password + token_secret are all non-empty. To run
# anonymously in development, set DOPILOT_AUTH_DISABLED=true (do NOT do this in
# production).

[server]
host = "0.0.0.0"
port = 5000
public_url = "http://localhost:5000"

[database]
url = "postgresql+psycopg://dopilot:dopilot@localhost:5432/dopilot"

[auth]
admin_username = "admin"
admin_password = "change-me"
token_secret = "change-me"
access_token_ttl_minutes = 720
stream_token_ttl_seconds = 60

[agent_auth]
# server -> agent token (egg deploy over HTTP /addversion.json). Distinct from
# [agents].server_shared_token below (agent -> server).
shared_token = "change-me-agent-token"

# Redis Streams transport (phase 1.5). Redis is a message bus, not a database.
[redis]
url = "redis://localhost:6379/0"
stream_maxlen_commands = 100000
stream_maxlen_events = 100000
stream_maxlen_logs = 1000000
log_retention_seconds = 86400
consumer_name = "server-1"
require_aof = true

[agents]
# Agent health = now - nodes.last_seen_at <= heartbeat_timeout_seconds.
heartbeat_timeout_seconds = 30
stalled_attempt_seconds = 300
lost_after_stalled_seconds = 900
# agent -> server token (heartbeat). MUST match the agent's
# [agent].server_shared_token. Leave empty to disable inbound agent auth (dev).
server_shared_token = "change-me-agent-server-token"

[nodes]
agents = ["localhost:6800"]

[scheduler]
enabled = true
timezone = "Asia/Shanghai"

[logs]
root_dir = "/server-data/logs"
background_drain_interval_seconds = 30
realtime_drain_interval_seconds = 1
max_tail_bytes_per_pull = 262144
eof_stable_seconds = 3
final_drain_hard_timeout_seconds = 30
# Phase 1.5: bounded drain window after a terminal event before finalize+cleanup.
log_drain_timeout_seconds = 30
retention_days = 30

[i18n]
locale = "zh"
timezone = "Asia/Shanghai"
