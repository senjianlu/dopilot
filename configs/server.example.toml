# dopilot server example config.
#
# Copy to configs/server.toml and edit, or rely on DOPILOT_* environment
# overrides in Docker deployments.
# WARNING: every "change-me" value below is a placeholder and is NOT production-safe.
# Replace admin_password / token_secret / shared_token before any real deployment.
#
# Env overrides (phase 2.2): most scalars/secrets below can be overridden by a
# DOPILOT_* environment variable (env wins over TOML), so real deployments inject
# secrets without mounting a TOML — e.g. DOPILOT_ADMIN_PASSWORD,
# DOPILOT_ADMIN_API_TOKEN, DOPILOT_DATABASE_URL, DOPILOT_REDIS_URL,
# DOPILOT_SERVER_PORT, DOPILOT_SCHEDULER_ENABLED, DOPILOT_AUTH_DISABLED.
# EXCEPTION: token_secret is TOML-only (phase 2.2.2) — it has NO env override.
#
# token_secret vs admin_api_token (phase 2.2.2):
#   - token_secret  = internal HMAC signing key for login access tokens + SSE
#                     stream tokens. TOML-only, never sent to clients.
#   - admin_api_token = externally supplied STATIC admin API token. Clients may
#                     present it directly as `Authorization: Bearer <token>` to
#                     authenticate as admin (no login). Set via TOML or
#                     DOPILOT_ADMIN_API_TOKEN. A non-empty value must be >= 16
#                     characters. It is ALSO the fallback source for empty
#                     machine tokens (below).
#
# Single-secret machine tokens (phase 2.2.2): leave [agent_auth].shared_token and
# [agents].server_shared_token empty to default them to auth.admin_api_token
# (DOPILOT_ADMIN_API_TOKEN); set DOPILOT_AGENT_SHARED_TOKEN /
# DOPILOT_SERVER_SHARED_TOKEN for split tokens. With no admin_api_token and no
# split tokens, machine auth falls back to OFF (config-present-or-off).
#
# Web admin auth is FAIL-CLOSED: the server refuses to start unless
# admin_username + admin_password + token_secret are all non-empty. To run
# anonymously in development, set DOPILOT_AUTH_DISABLED=true (do NOT do this in
# production).

[server]
host = "0.0.0.0"
port = 5000
public_url = "http://localhost:5000"

[database]
url = "postgresql+psycopg://dopilot:dopilot@localhost:5432/dopilot"

[auth]
admin_username = "admin"
admin_password = "change-me"
# Internal signing key (TOML-only, no env override). This example value is
# public; replace with your own long random value before any real deployment.
token_secret = "shLv5qNwC3aViZQYr08x3yfaY6yGZACB6ujydXiVaGnb7OdOflc91xVLyXBoeRDL"
# Static admin API token: usable directly as `Authorization: Bearer <token>` and
# the default source for the machine tokens below. Leave empty to disable both;
# a non-empty value must be >= 16 chars. Override with DOPILOT_ADMIN_API_TOKEN.
admin_api_token = "change-me-admin-api-token"
access_token_ttl_minutes = 720
stream_token_ttl_seconds = 60

[agent_auth]
# server -> agent token (egg deploy over HTTP /addversion.json). Distinct from
# [agents].server_shared_token below (agent -> server).
shared_token = "change-me-agent-token"

# Redis Streams transport (phase 1.5). Redis is a message bus, not a database.
[redis]
url = "redis://localhost:6379/0"
stream_maxlen_commands = 100000
stream_maxlen_events = 100000
stream_maxlen_logs = 1000000
log_retention_seconds = 86400
consumer_name = "server-1"
require_aof = true

[agents]
# Agent health = now - nodes.last_seen_at <= heartbeat_timeout_seconds.
heartbeat_timeout_seconds = 30
stalled_attempt_seconds = 300
lost_after_stalled_seconds = 900
# agent -> server token (heartbeat). MUST match the agent's
# [agent].server_shared_token. Leave empty to default to auth.admin_api_token
# (single-secret posture), or to disable inbound agent auth when no admin token
# is set either.
server_shared_token = "change-me-agent-server-token"

[nodes]
agents = ["localhost:6800"]

[scheduler]
enabled = true
timezone = "Asia/Shanghai"

[logs]
root_dir = "/server-data/logs"
background_drain_interval_seconds = 30
realtime_drain_interval_seconds = 1
max_tail_bytes_per_pull = 262144
eof_stable_seconds = 3
final_drain_hard_timeout_seconds = 30
# Phase 1.5: bounded drain window after a terminal event before finalize+cleanup.
log_drain_timeout_seconds = 30
retention_days = 30

[i18n]
locale = "zh"
timezone = "Asia/Shanghai"
