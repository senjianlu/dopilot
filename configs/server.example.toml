# dopilot server example config.
#
# Copy to configs/server.toml and edit, or rely on DOPILOT_* environment
# overrides in Docker deployments.
# WARNING: every "change-me" value below is a placeholder and is NOT production-safe.
# Replace admin_password / token_secret / agent_token before any real deployment.
#
# Env overrides (phase 2.2): most scalars/secrets below can be overridden by a
# DOPILOT_* environment variable (env wins over TOML), so real deployments inject
# secrets without mounting a TOML — e.g. DOPILOT_ADMIN_PASSWORD,
# DOPILOT_ADMIN_API_TOKEN, DOPILOT_AGENT_TOKEN, DOPILOT_DATABASE_URL,
# DOPILOT_REDIS_URL, DOPILOT_SERVER_PORT, DOPILOT_SCHEDULER_ENABLED,
# DOPILOT_AUTH_DISABLED.
# EXCEPTION: token_secret is TOML-only (phase 2.2.2) — it has NO env override.
#
# Two separate tokens (phase 2.2.3) — admin auth and machine auth never mix:
#   - admin_api_token = externally supplied STATIC admin API token. Clients may
#                     present it directly as `Authorization: Bearer <token>` to
#                     authenticate as admin (no login). Set via TOML or
#                     DOPILOT_ADMIN_API_TOKEN. A non-empty value must be >= 16
#                     characters. It is ADMIN-ONLY: it is NEVER a source for the
#                     server<->agent machine token.
#   - [agents].agent_token = the agent machine token (below). Agents present it
#                     on outbound calls to the server (heartbeat + artifact/wheel
#                     fetch). No fallback from admin_api_token.
#   - token_secret  = internal HMAC signing key for login access tokens + SSE
#                     stream tokens. TOML-only, never sent to clients.
#
# Machine auth (phase 2.2.3) is config-present-or-off: it is ON iff
# [agents].agent_token is non-empty (a non-empty value must be >= 16 chars; set
# via DOPILOT_AGENT_TOKEN or the field). Leave it empty to disable machine auth.
# The old split tokens (DOPILOT_AGENT_SHARED_TOKEN / DOPILOT_SERVER_SHARED_TOKEN,
# [agent_auth].shared_token, [agents].server_shared_token) were removed and have
# NO effect.
#
# NOTE: token auth is NOT transport encryption. For encrypted cross-host traffic
# put the server, agents, and Redis on a private network / VPN, or terminate TLS
# at a reverse proxy. The token only proves identity over whatever transport you
# provide.
#
# Web admin auth is FAIL-CLOSED: the server refuses to start unless
# admin_username + admin_password + token_secret are all non-empty. To run
# anonymously in development, set DOPILOT_AUTH_DISABLED=true (do NOT do this in
# production).

[server]
host = "0.0.0.0"
port = 5000
public_url = "http://localhost:5000"
# Server-owned data root (phase 2.2.4). Anchors the auto-generated server<->agent
# token at <data_dir>/secrets/agent-token (see [agents].agent_token below).
# Distinct from logs/artifacts roots. Override with DOPILOT_SERVER_DATA_DIR.
data_dir = "/server-data"

[database]
url = "postgresql+psycopg://dopilot:dopilot@localhost:5432/dopilot"

[auth]
admin_username = "admin"
admin_password = "change-me"
# Internal signing key (TOML-only, no env override). This example value is
# public; replace with your own long random value before any real deployment.
token_secret = "shLv5qNwC3aViZQYr08x3yfaY6yGZACB6ujydXiVaGnb7OdOflc91xVLyXBoeRDL"
# Static admin API token: usable directly as `Authorization: Bearer <token>`.
# Admin-only (phase 2.2.3) — it is NOT a source for [agents].agent_token. Leave
# empty to disable it; a non-empty value must be >= 16 chars. Override with
# DOPILOT_ADMIN_API_TOKEN.
admin_api_token = "change-me-admin-api-token"
access_token_ttl_minutes = 720
stream_token_ttl_seconds = 60

# Redis Streams transport (phase 1.5). Redis is a message bus, not a database.
[redis]
url = "redis://localhost:6379/0"
stream_maxlen_commands = 100000
stream_maxlen_events = 100000
stream_maxlen_logs = 1000000
log_retention_seconds = 86400
consumer_name = "server-1"
require_aof = true

[agents]
# Agent health = now - nodes.last_seen_at <= heartbeat_timeout_seconds.
heartbeat_timeout_seconds = 30
stalled_attempt_seconds = 300
lost_after_stalled_seconds = 900
# The single server<->agent machine token (phase 2.2.3). It MUST match the
# agent's [agent].agent_token. The agent presents it on its outbound calls
# (agent -> server heartbeat + artifact/wheel fetch) and the server validates
# them; there is no server -> agent HTTP direction (phase 2.2.7). A non-empty
# value must be >= 16 chars; set via DOPILOT_AGENT_TOKEN or this field.
#
# Phase 2.2.4: leave this EMPTY (and unset DOPILOT_AGENT_TOKEN) to let the server
# auto-generate + persist a strong token under [server].data_dir on first start
# (/server-data/secrets/agent-token), reused on restart. Retrieve it with
# `dopilot-server agent-token print` and set it on every agent. Generation is
# server-only; `load_settings()` never creates this file (it is a runtime step).
agent_token = "change-me-agent-token"

[nodes]
# Liveness comes from agent heartbeats, not a configured endpoint list (nodes
# appear only once an agent heartbeats in), so leave this empty. The agent is
# outbound-only (phase 2.2.7) — the server never dials an agent endpoint.
agents = []

[scheduler]
enabled = true
timezone = "Asia/Shanghai"

[logs]
root_dir = "/server-data/logs"
background_drain_interval_seconds = 30
realtime_drain_interval_seconds = 1
max_tail_bytes_per_pull = 262144
eof_stable_seconds = 3
final_drain_hard_timeout_seconds = 30
# Phase 1.5: bounded drain window after a terminal event before finalize+cleanup.
log_drain_timeout_seconds = 30
retention_days = 30

[i18n]
locale = "zh"
timezone = "Asia/Shanghai"
