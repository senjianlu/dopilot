# dopilot server config for the docker-compose backend loop.
#
# Same as server.example.toml but tuned for the compose network: the database
# and agent are reached by SERVICE NAME (db / agent), not localhost — inside the
# server container "localhost" is the server itself. See docs/dopilot/08 §2.5.
#
# change-me* values are NOT production-safe; this file is a local/dev compose
# convenience, not a secret store.
#
# Env overrides (phase 2.2): any scalar/secret can be overridden by a DOPILOT_*
# env var (env wins over TOML). The compose stack already injects
# DOPILOT_DATABASE_URL / DOPILOT_REDIS_URL this way; real deployments should
# override DOPILOT_ADMIN_PASSWORD / DOPILOT_ADMIN_API_SECRET rather than editing
# this file. Web admin auth is fail-closed (the three [auth] creds must be
# non-empty); DOPILOT_AUTH_DISABLED=true is the dev-only escape hatch.
#
# Single-secret machine tokens (phase 2.2.1): the [agent_auth].shared_token and
# [agents].server_shared_token fields below are intentionally EMPTY so the loader
# defaults them to the effective admin API secret (auth.token_secret /
# DOPILOT_ADMIN_API_SECRET). Set DOPILOT_AGENT_SHARED_TOKEN /
# DOPILOT_SERVER_SHARED_TOKEN (or fill these fields) to use split tokens instead.

[server]
host = "0.0.0.0"
port = 5000
public_url = "http://localhost:5000"

[database]
url = "postgresql+psycopg://dopilot:dopilot@db:5432/dopilot"

[auth]
admin_username = "admin"
admin_password = "change-me"
token_secret = "change-me"
access_token_ttl_minutes = 720
stream_token_ttl_seconds = 60

[agent_auth]
# server -> agent token; must match [auth].shared_token in the agent config.
# Empty => defaults to the effective admin API secret (single-secret posture).
shared_token = ""

# Redis reached by its compose SERVICE NAME (redis), with AUTH password.
[redis]
url = "redis://:change-me-redis-pass@redis:6379/0"
stream_maxlen_commands = 100000
stream_maxlen_events = 100000
stream_maxlen_logs = 1000000
log_retention_seconds = 86400
consumer_name = "server-1"
require_aof = true

[agents]
heartbeat_timeout_seconds = 30
stalled_attempt_seconds = 300
lost_after_stalled_seconds = 900
# agent -> server token; must match [agent].server_shared_token in agent config.
# Empty => defaults to the effective admin API secret (single-secret posture).
server_shared_token = ""

[nodes]
# Phase 1.5+ liveness comes from agent heartbeats, not a configured endpoint
# list, so this stays empty: nodes appear only once an agent heartbeats in. This
# keeps GET /api/v1/nodes free of phantom "configured-but-unseen" rows (the E2E
# acceptance asserts an EXACT node count). The old single ["agent:6800"] entry
# was only a pre-heartbeat placeholder.
agents = []

[scheduler]
enabled = true
timezone = "Asia/Shanghai"

[logs]
root_dir = "/server-data/logs"
background_drain_interval_seconds = 30
realtime_drain_interval_seconds = 1
max_tail_bytes_per_pull = 262144
eof_stable_seconds = 3
final_drain_hard_timeout_seconds = 30
log_drain_timeout_seconds = 30
retention_days = 30

[i18n]
locale = "zh"
timezone = "Asia/Shanghai"
