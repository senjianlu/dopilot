[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dopilot-protocol"
version = "0.0.0"
description = "Shared server<->agent Pydantic v2 schemas for dopilot."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[tool.hatch.build.targets.wheel]
packages = ["dopilot_protocol"]
